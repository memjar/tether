<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--accent:#D4AF37;--dark:#0a0a0c;--card:#111113;--text:#e5e5e5;--dim:#737373;--mono:'IBM Plex Mono',monospace;--border:rgba(255,255,255,0.06);}
        body{font-family:'Space Grotesk',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,12,0.95);backdrop-filter:blur(24px);flex-shrink:0;}
        .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;}
        .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(212,175,55,0.4);}
        .status{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:0.06em;display:flex;align-items:center;gap:8px;}
        .status-dot{width:6px;height:6px;border-radius:50%;background:#444;}
        .status-dot.live{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.4);}
        .status-dot.warn{background:var(--accent);}
        main{flex:1;display:flex;overflow:hidden;}
        .sidebar{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:rgba(10,10,12,0.6);}
        .sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
        .sidebar-title{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;}
        .refresh-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--dim);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;transition:all 0.2s;}
        .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
        .beacon-list{flex:1;overflow-y:auto;padding:8px;}
        .beacon-item{padding:14px 16px;cursor:pointer;transition:background 0.2s;border:1px solid transparent;margin-bottom:4px;}
        .beacon-item:hover{background:rgba(212,175,55,0.03);border-color:rgba(212,175,55,0.1);}
        .beacon-item.active{background:rgba(212,175,55,0.06);border-color:rgba(212,175,55,0.2);}
        .beacon-name{font-size:14px;font-weight:500;margin-bottom:4px;}
        .beacon-meta{font-family:var(--mono);font-size:10px;color:var(--dim);display:flex;gap:12px;}
        .beacon-empty{padding:32px 16px;text-align:center;color:var(--dim);font-size:13px;line-height:1.6;}
        .join-input{padding:12px 16px;border-top:1px solid var(--border);}
        .join-input input{width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.08);color:#fff;padding:10px 14px;font-family:var(--mono);font-size:12px;outline:none;transition:border-color 0.2s;}
        .join-input input::placeholder{color:#555;}
        .join-input input:focus{border-color:var(--accent);}
        .chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
        .chat-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .chat-beacon-name{font-size:15px;font-weight:500;}
        .chat-beacon-info{font-family:var(--mono);font-size:10px;color:var(--dim);}
        .disconnect-btn{background:none;border:1px solid rgba(255,0,0,0.2);color:#ef4444;font-family:var(--mono);font-size:10px;padding:6px 14px;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;}
        .disconnect-btn:hover{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.4);}
        .messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:8px;}
        .msg{max-width:70%;padding:10px 16px;font-size:14px;line-height:1.5;word-break:break-word;}
        .msg.self{align-self:flex-end;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.2);}
        .msg.peer{align-self:flex-start;background:var(--card);border:1px solid var(--border);}
        .msg.system{align-self:center;font-family:var(--mono);font-size:11px;color:var(--dim);background:none;padding:4px 0;max-width:100%;}
        .msg-sender{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:4px;}
        .chat-input{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;flex-shrink:0;}
        .chat-input input{flex:1;background:var(--card);border:1px solid rgba(255,255,255,0.08);color:#fff;padding:12px 16px;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
        .chat-input input::placeholder{color:#555;}
        .chat-input input:focus{border-color:var(--accent);}
        .send-btn{background:var(--accent);border:none;color:#000;padding:12px 24px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;}
        .send-btn:hover{background:#fff;}
        .send-btn:disabled{opacity:0.3;cursor:default;}
        .no-beacon{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:16px;}
        .no-beacon h3{font-size:18px;font-weight:400;color:var(--text);}
        .no-beacon p{font-size:13px;max-width:320px;text-align:center;line-height:1.6;}
        @media(max-width:640px){.sidebar{display:none;}main{flex-direction:column;}}
    </style>
</head>
<body>
    <header>
        <div class="logo"><div class="logo-dot"></div>TETHER CLOUD</div>
        <div class="status" id="connStatus"><div class="status-dot" id="statusDot"></div><span id="statusText">OFFLINE</span></div>
    </header>
    <main>
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Beacons</span>
                <button class="refresh-btn" onclick="loadBeacons()">REFRESH</button>
            </div>
            <div class="beacon-list" id="beaconList">
                <div class="beacon-empty">Scanning for active beacons...</div>
            </div>
            <div class="join-input">
                <input type="text" id="joinCode" placeholder="Enter beacon ID" onkeydown="if(event.key==='Enter')joinBeacon(this.value)">
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="no-beacon" id="noBanner">
                <h3>No beacon selected</h3>
                <p>Select a beacon from the sidebar or enter a beacon ID to join a Tether mesh from your browser.</p>
            </div>
        </div>
    </main>

<script>
const RELAY = 'https://beam.tether.diy';
const WS_RELAY = 'wss://beam.tether.diy';
let ws = null;
let clientId = null;
let currentBeacon = null;
let clientName = 'Web-' + Math.random().toString(36).slice(2, 6).toUpperCase();

async function loadBeacons() {
    try {
        const res = await fetch(`${RELAY}/beacons`);
        const data = await res.json();
        const list = document.getElementById('beaconList');
        if (!data.beacons || data.beacons.length === 0) {
            list.innerHTML = '<div class="beacon-empty">No active beacons found.<br>Open a beacon from your Tether device to get started.</div>';
            return;
        }
        list.innerHTML = data.beacons.map(b => `
            <div class="beacon-item ${currentBeacon === b.beacon_id ? 'active' : ''}" onclick="joinBeacon('${b.beacon_id}')">
                <div class="beacon-name">${esc(b.device_name)}</div>
                <div class="beacon-meta">
                    <span>${b.beacon_id}</span>
                    <span>${b.client_count} connected</span>
                    <span>${b.sharing_type}</span>
                </div>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('beaconList').innerHTML = '<div class="beacon-empty">Failed to reach relay server.</div>';
    }
}

function joinBeacon(beaconId) {
    if (!beaconId) return;
    if (ws) { ws.close(); ws = null; }

    currentBeacon = beaconId;
    setStatus('connecting', 'warn');

    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML = `
        <div class="chat-header">
            <div>
                <div class="chat-beacon-name" id="chatName">${esc(beaconId)}</div>
                <div class="chat-beacon-info" id="chatInfo">CONNECTING...</div>
            </div>
            <button class="disconnect-btn" onclick="disconnect()">DISCONNECT</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()" disabled>
            <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>SEND</button>
        </div>
    `;

    ws = new WebSocket(`${WS_RELAY}/relay/${beaconId}?role=client&name=${encodeURIComponent(clientName)}`);

    ws.onopen = () => {};

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
            case 'connected':
                clientId = msg.client_id;
                setStatus('online', 'live');
                document.getElementById('chatInfo').textContent = `${msg.beacon.device_name} // ${msg.beacon.client_count} peers // ${msg.beacon.sharing_type}`;
                document.getElementById('chatName').textContent = msg.beacon.device_name;
                document.getElementById('msgInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                addSystemMsg(`Connected to ${msg.beacon.device_name} as ${clientName}`);
                break;
            case 'peer_joined':
                addSystemMsg(`${msg.name || msg.client_id} joined (${msg.client_count} connected)`);
                break;
            case 'peer_left':
                addSystemMsg(`${msg.client_id} left (${msg.client_count} connected)`);
                break;
            case 'host_disconnected':
                addSystemMsg('Host device disconnected');
                setStatus('no host', 'warn');
                break;
            case 'chat':
                addPeerMsg(msg.from_name || msg.from, msg.text);
                break;
            case 'pong':
                break;
            default:
                if (msg.text) addPeerMsg(msg.from_name || msg.from || '?', msg.text);
        }
    };

    ws.onclose = (e) => {
        setStatus('disconnected', '');
        addSystemMsg(`Disconnected: ${e.reason || 'connection closed'}`);
        document.getElementById('msgInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
    };

    ws.onerror = () => {
        setStatus('error', 'warn');
    };

    loadBeacons();
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'chat', text }));
    addSelfMsg(text);
    input.value = '';
    input.focus();
}

function disconnect() {
    if (ws) { ws.close(); ws = null; }
    currentBeacon = null;
    clientId = null;
    setStatus('offline', '');
    document.getElementById('chatArea').innerHTML = `
        <div class="no-beacon" id="noBanner">
            <h3>No beacon selected</h3>
            <p>Select a beacon from the sidebar or enter a beacon ID to join a Tether mesh from your browser.</p>
        </div>
    `;
    loadBeacons();
}

function addSystemMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg system';
    el.textContent = text;
    appendMsg(el);
}

function addPeerMsg(sender, text) {
    const el = document.createElement('div');
    el.className = 'msg peer';
    el.innerHTML = `<div class="msg-sender">${esc(sender)}</div>${esc(text)}`;
    appendMsg(el);
}

function addSelfMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg self';
    el.innerHTML = `<div class="msg-sender">${esc(clientName)}</div>${esc(text)}`;
    appendMsg(el);
}

function appendMsg(el) {
    const container = document.getElementById('messages');
    if (!container) return;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
}

function setStatus(text, cls) {
    document.getElementById('statusText').textContent = text.toUpperCase();
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot';
    if (cls) dot.classList.add(cls);
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// Keepalive
setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'ping'})); }, 25000);

// Init
loadBeacons();
setInterval(loadBeacons, 15000);
</script>
</body>
</html>
