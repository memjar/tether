<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Tether</title>
    <meta name="description" content="Download Tether for macOS and iOS. Available on TestFlight.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--accent:#D4AF37;--dark:#0a0a0c;--card:#111113;--text:#e5e5e5;--dim:#737373;--mono:'IBM Plex Mono',monospace;}
        body{font-family:'Space Grotesk',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

        nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,12,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.06);}
        .logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;color:#fff;}
        .logo-globe{width:32px;height:32px;border-radius:50%;}
        .nav-cta{background:var(--accent);padding:10px 28px;font-size:12px;font-weight:600;letter-spacing:0.06em;color:#000;text-decoration:none;text-transform:uppercase;transition:all 0.2s;}
        .nav-cta:hover{background:#fff;}

        .page-enter{animation:pageIn 0.6s ease-out;}
        @keyframes pageIn{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}

        .download-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 40px 80px;position:relative;}
        .download-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(212,175,55,0.04) 0%,transparent 60%);pointer-events:none;}

        .beacon-visual{position:relative;width:160px;height:160px;margin-bottom:48px;}
        .beacon-visual .core{position:absolute;top:50%;left:50%;width:20px;height:20px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%);animation:bvPulse 2s ease-in-out infinite;}
        .beacon-visual .ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1.5px solid var(--accent);transform:translate(-50%,-50%);opacity:0;}
        .beacon-visual .r1{width:50px;height:50px;animation:bvRing 2s ease-out infinite 0.2s;}
        .beacon-visual .r2{width:85px;height:85px;animation:bvRing 2s ease-out infinite 0.5s;}
        .beacon-visual .r3{width:120px;height:120px;animation:bvRing 2s ease-out infinite 0.8s;}
        .beacon-visual .r4{width:155px;height:155px;animation:bvRing 2s ease-out infinite 1.1s;}
        @keyframes bvPulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.15);opacity:0.85;}}
        @keyframes bvRing{0%{transform:translate(-50%,-50%) scale(0.7);opacity:0.5;}100%{transform:translate(-50%,-50%) scale(1.05);opacity:0;}}

        .download-hero h1{font-size:clamp(40px,7vw,72px);font-weight:300;letter-spacing:-0.03em;line-height:1;margin-bottom:16px;}
        .download-hero h1 span{color:var(--accent);}
        .download-hero > p{color:var(--dim);margin-bottom:48px;font-size:17px;max-width:440px;}

        .download-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:48px;}
        .dl-btn{display:flex;align-items:center;gap:12px;padding:16px 32px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:#fff;text-decoration:none;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;}
        .dl-btn:hover{background:#fff;color:#000;border-color:#fff;transform:translateY(-2px);}
        .dl-btn svg{width:24px;height:24px;flex-shrink:0;}
        .dl-btn:hover svg{fill:#000;stroke:#000;}
        .dl-btn-text{text-align:left;}
        .dl-btn-sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;line-height:1;}
        .dl-btn:hover .dl-btn-sub{color:#525252;}
        .dl-btn-main{font-size:16px;font-weight:600;letter-spacing:0.02em;line-height:1.2;}
        .dl-btn-primary{background:var(--accent);border-color:var(--accent);color:#000;}
        .dl-btn-primary .dl-btn-sub{color:rgba(0,0,0,0.5);}
        .dl-btn-primary svg{fill:#000;stroke:#000;}
        .dl-btn-primary:hover{background:#fff;border-color:#fff;}

        .dl-divider{display:flex;align-items:center;gap:16px;max-width:420px;margin:0 auto 32px;color:#525252;font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;}
        .dl-divider::before,.dl-divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.08);}

        .email-form{display:flex;gap:0;max-width:420px;margin:0 auto;}
        .email-form input{flex:1;padding:16px 20px;border:1.5px solid rgba(255,255,255,0.15);border-right:none;background:transparent;color:#fff;font-size:15px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color 0.2s;}
        .email-form input:focus{border-color:var(--accent);}
        .email-form input::placeholder{color:#525252;}
        .email-form button{padding:16px 32px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;letter-spacing:0.04em;transition:all 0.2s;white-space:nowrap;}
        .email-form button:hover{background:#fff;color:#000;border-color:#fff;}

        .requirements{margin-top:72px;padding:40px;border:1px solid rgba(255,255,255,0.04);max-width:560px;width:100%;}
        .requirements h3{font-size:14px;font-weight:600;margin-bottom:20px;color:var(--accent);font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;}
        .req-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .req-item{font-size:13px;color:var(--dim);display:flex;align-items:center;gap:8px;}
        .req-item svg{width:16px;height:16px;flex-shrink:0;}

        .footer{border-top:1px solid rgba(255,255,255,0.04);padding:40px 48px;text-align:center;}
        .footer p{font-size:12px;color:#525252;font-family:var(--mono);}
        .footer a{color:var(--accent);text-decoration:none;}

        @media(max-width:768px){
            nav{padding:16px 20px;}
            .download-hero{padding:100px 20px 60px;}
            .download-buttons{flex-direction:column;align-items:center;}
            .dl-btn{width:100%;max-width:300px;justify-content:center;}
            .email-form{flex-direction:column;}
            .email-form input{border-right:1.5px solid rgba(255,255,255,0.15);border-bottom:none;}
            .req-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body class="page-enter">

<nav>
    <a href="index.html" class="logo">
        <canvas class="logo-globe" id="logoGlobe" width="64" height="64"></canvas>
        Tether
    </a>
    <a href="index.html" class="nav-cta" style="background:transparent;border:1.5px solid rgba(255,255,255,0.15);color:#fff;">Back</a>
</nav>

<section class="download-hero">
    <div class="beacon-visual">
        <div class="core"></div>
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>
    </div>

    <h1>Get <span>Tether.</span></h1>
    <p>Available now on TestFlight. macOS coming soon.</p>

    <div class="download-buttons">
        <a href="#" id="testflight-btn" class="dl-btn dl-btn-primary" onclick="return false;">
            <svg viewBox="0 0 24 24" fill="#000" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            <div class="dl-btn-text"><div class="dl-btn-sub">Download on</div><div class="dl-btn-main">TestFlight</div></div>
        </a>
        <a href="https://github.com/memjar/tether/releases" class="dl-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M3 17h18M8 21h8M12 17v4"/></svg>
            <div class="dl-btn-text"><div class="dl-btn-sub">Download for</div><div class="dl-btn-main">macOS</div></div>
        </a>
    </div>

    <div class="dl-divider">or get notified</div>
    <div class="email-form">
        <input type="email" placeholder="you@email.com" id="email-input">
        <button onclick="submitEmail()">Notify Me</button>
    </div>
    <p id="form-msg" style="margin-top:20px;font-size:13px;display:none;"></p>

    <div class="requirements">
        <h3>Requirements</h3>
        <div class="req-grid">
            <div class="req-item">
                <svg fill="none" stroke="#D4AF37" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M3 17h18"/></svg>
                macOS 12+
            </div>
            <div class="req-item">
                <svg fill="none" stroke="#D4AF37" stroke-width="1.5" viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="2.5"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
                iOS 16+
            </div>
            <div class="req-item">
                <svg fill="none" stroke="#D4AF37" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                &lt;10 MB
            </div>
            <div class="req-item">
                <svg fill="none" stroke="#D4AF37" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Zero dependencies
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <p>tether.diy &mdash; <a href="https://axetechnologies.ca">AXE Technologies</a> &mdash; 2026</p>
</footer>

<script>
function submitEmail(){
    var input=document.getElementById('email-input'),msg=document.getElementById('form-msg'),email=input.value.trim();
    if(!email||!email.includes('@')){msg.textContent='Enter a valid email.';msg.style.color='#ef4444';msg.style.display='block';return;}
    msg.textContent="You're on the list. We'll be in touch.";msg.style.color='#14b8a6';msg.style.display='block';input.value='';
}

// NAV MINI GLOBE
(function(){
var C=document.getElementById('logoGlobe');if(!C)return;
var ctx=C.getContext('2d');var S=32,R=13,cx=S/2,cy=S/2;
C.style.width=S+'px';C.style.height=S+'px';
var dpr=window.devicePixelRatio||1;C.width=S*dpr;C.height=S*dpr;ctx.scale(dpr,dpr);
var CONT=[
[[-130,50],[-125,55],[-110,62],[-95,68],[-80,62],[-65,48],[-60,44],[-70,30],[-82,25],[-90,18],[-105,22],[-120,36],[-130,50]],
[[-80,10],[-72,12],[-60,8],[-50,2],[-38,-2],[-35,-8],[-42,-22],[-52,-32],[-66,-52],[-75,-42],[-72,-25],[-75,-5],[-80,10]],
[[-8,37],[10,48],[25,58],[30,65],[18,70],[5,60],[-5,48],[-10,37],[-8,37]],
[[-15,32],[10,37],[25,30],[35,22],[42,8],[42,-5],[35,-25],[20,-35],[10,-8],[0,5],[-10,8],[-17,20],[-15,32]],
[[30,35],[55,40],[70,35],[90,22],[110,22],[125,35],[140,50],[135,65],[110,70],[80,70],[60,55],[42,42],[30,35]],
[[115,-14],[135,-14],[152,-26],[145,-38],[128,-30],[114,-22],[115,-14]]
];
var a=0;
function p(lon,lat){var lr=(lon+a)*Math.PI/180,la=lat*Math.PI/180;var x=Math.cos(la)*Math.sin(lr),y=-Math.sin(la),z=Math.cos(la)*Math.cos(lr);return[cx+x*R,cy+y*R,z];}
function draw(){
ctx.clearRect(0,0,S,S);ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle='#0a0a0c';ctx.fill();
ctx.strokeStyle='rgba(212,175,55,0.06)';ctx.lineWidth=0.3;
for(var lat=-60;lat<=60;lat+=30){ctx.beginPath();var on=false;for(var lon=-180;lon<=180;lon+=4){var pp=p(lon,lat);if(pp[2]>0){if(!on){ctx.moveTo(pp[0],pp[1]);on=true;}else ctx.lineTo(pp[0],pp[1]);}else on=false;}ctx.stroke();}
for(var ci=0;ci<CONT.length;ci++){var c=CONT[ci];if(c.map(function(cc){return p(cc[0],cc[1]);}).filter(function(v){return v[2]>-0.1;}).length<2)continue;ctx.beginPath();var f=true;for(var j=0;j<c.length;j++){var pp2=p(c[j][0],c[j][1]);if(pp2[2]>-0.1){if(f){ctx.moveTo(pp2[0],pp2[1]);f=false;}else ctx.lineTo(pp2[0],pp2[1]);}}ctx.closePath();ctx.fillStyle='rgba(212,175,55,0.85)';ctx.fill();}
ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.strokeStyle='rgba(212,175,55,0.35)';ctx.lineWidth=0.8;ctx.stroke();
a+=0.3;requestAnimationFrame(draw);
}
draw();
})();
</script>
</body>
</html>
